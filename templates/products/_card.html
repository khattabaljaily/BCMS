<div class="cx-card" id="card-{{ p.pk }}">
  <div class="cx-card-head">
    <div>
      <div class="cx-card-title">{{ p.name }}</div>
      <div class="cx-card-sub">{{ p.category.name|default:"بدون تصنيف" }}{% if p.sku %} · {{ p.sku }}{% endif %}</div>
    </div>
    <div class="cx-card-actions">
      <button type="button" class="cx-act"
              onclick="openEditProduct({{ p.pk }}, '{{ p.name|escapejs }}', '{{ p.sku|default_if_none:''|escapejs }}', {{ p.category_id|default:'null' }}, '{{ p.price }}', '{{ p.cost }}', '{{ p.stock }}', '{{ p.min_stock }}', '{{ p.description|default:''|escapejs }}', {{ p.is_active|yesno:'true,false' }}, {{ p.show_in_store|yesno:'true,false' }})">
        <i class="fas fa-edit"></i>
      </button>
      <button type="button" class="cx-act cx-act--del"
              onclick="BCMS.ajaxDelete('{% url 'products:delete' p.pk %}', 'أرشفة المنتج {{ p.name|escapejs }}؟', 'row-{{ p.pk }}')">
        <i class="fas fa-archive"></i>
      </button>
    </div>
  </div>
  <div class="cx-card-meta">
    <div>
      <span class="cx-card-meta-label">السعر</span>
      <span class="cx-card-meta-value" style="color:var(--rose);font-weight:800;">{{ p.price|format_number:2 }}</span>
    </div>
    <div>
      <span class="cx-card-meta-label">المخزون</span>
      <span class="cx-card-meta-value">
        <span class="badge {% if p.is_low_stock %}badge--red{% else %}badge--green{% endif %}">{{ p.stock|format_number:0 }}</span>
      </span>
    </div>
    <div>
      <span class="cx-card-meta-label">الحالة</span>
      <span class="cx-card-meta-value">
        {% if p.is_active %}<span class="cx-status cx-status--on"><span class="cx-status-dot"></span>نشط</span>
        {% else %}<span class="cx-status cx-status--off"><span class="cx-status-dot"></span>موقوف</span>{% endif %}
      </span>
    </div>
  </div>
</div>
