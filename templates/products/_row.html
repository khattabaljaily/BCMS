<tr id="row-{{ p.pk }}">
  <td>
    <strong>{{ p.name }}</strong>
    {% if p.sku %}<br><small class="text-muted" style="font-family:monospace;">{{ p.sku }}</small>{% endif %}
  </td>
  <td>{{ p.category.name|default:"—" }}</td>
  <td><strong style="color:var(--rose);">{{ p.price|format_number:2 }}</strong></td>
  <td>
    <span class="badge {% if p.is_low_stock %}badge--red{% else %}badge--green{% endif %}">{{ p.stock|format_number:0 }}</span>
    {% if p.is_low_stock %}
    <small class="text-muted" style="font-size:10px;display:block;margin-top:2px;color:var(--red);">مخزون منخفض</small>
    {% endif %}
  </td>
  <td>
    {% if p.is_active %}
    <span class="cx-status cx-status--on"><span class="cx-status-dot"></span>نشط</span>
    {% else %}
    <span class="cx-status cx-status--off"><span class="cx-status-dot"></span>موقوف</span>
    {% endif %}
  </td>
  <td>
    <div class="cx-row-actions">
      <button type="button" class="cx-act" title="تعديل"
              onclick="openEditProduct({{ p.pk }}, '{{ p.name|escapejs }}', '{{ p.sku|default_if_none:''|escapejs }}', {{ p.category_id|default:'null' }}, '{{ p.price }}', '{{ p.cost }}', '{{ p.stock }}', '{{ p.min_stock }}', '{{ p.description|default:''|escapejs }}', {{ p.is_active|yesno:'true,false' }}, {{ p.show_in_store|yesno:'true,false' }})">
        <i class="fas fa-edit"></i>
      </button>
      <button type="button" class="cx-act cx-act--del" title="أرشفة"
              onclick="BCMS.ajaxDelete('{% url 'products:delete' p.pk %}', 'أرشفة المنتج {{ p.name|escapejs }}؟', 'row-{{ p.pk }}')">
        <i class="fas fa-archive"></i>
      </button>
    </div>
  </td>
</tr>
