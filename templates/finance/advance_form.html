{% extends "base.html" %}
{% block page_title %}سلفة جديدة{% endblock %}
{% block content %}
<div class="card">
  <div class="card__body">
    <h3 style="margin-bottom:16px;">تسجيل سلفة</h3>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>الفنية</label>
        <select name="specialist" class="form-control" required>
          <option value="">اختر فنية</option>
          {% for s in specialists %}
            <option value="{{ s.pk }}">{{ s.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>المبلغ</label>
        <input name="amount" type="number" step="0.01" min="0" class="form-control" required>
      </div>
      <div class="form-group">
        <label>التاريخ</label>
        <input name="date" type="date" class="form-control" value="{{ today|date:'Y-m-d' }}" required>
      </div>
      <div class="form-group">
        <label>الخزينة</label>
        <select name="treasury" class="form-control">
          <option value="">بدون خزينة</option>
          {% for t in treasuries %}
            <option value="{{ t.pk }}" {% if forloop.first %}selected{% endif %}>{{ t.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>ملاحظات</label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
      </div>
      <div class="form-group">
        <button class="btn btn--primary">حفظ</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
