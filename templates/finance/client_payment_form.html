{% extends "base.html" %}
{% load number_format %}
{% load humanize %}
{% block page_title %}سجل دفعة عميل{% endblock %}
{% block content %}
<div class="card">
  <div class="card__body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group"><label>الفاتورة</label>
        <select name="invoice" class="form-control">
          {% for inv in invoices %}
          <option value="{{ inv.pk }}">{{ inv.number }} — {{ inv.client }} — {{ inv.total|format_number:2 }} — متبقي: {{ inv.remaining|format_number:2 }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group"><label>المبلغ</label><input name="amount" class="form-control" required></div>
      <div class="form-group"><label>طريقة الدفع</label>
        <select name="method" class="form-control">
          <option value="cash">نقد</option>
          <option value="card_or_bank">بطاقة أو بنك</option>
        </select>
      </div>
      <div class="form-group"><button class="btn btn--primary">حفظ</button></div>
    </form>
  </div>
</div>
{% endblock %}
