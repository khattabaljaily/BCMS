{% load number_format %}
<div class="modal-overlay" id="advance-modal" style="display:none;">
  <div class="modal-dialog">
    <div class="modal-header">
      <span class="modal-title"><i class="fas fa-hand-holding-usd" style="color:#f59e0b;margin-left:8px;"></i> سلفة جديدة</span>
      <button class="btn btn--ghost btn--icon" data-close-modal="advance-modal"><i class="fas fa-times"></i></button>
    </div>
    <form id="advance-form" method="post" action="{% url 'finance:advance_create' %}">
      {% csrf_token %}
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">مقدم الخدمة <span style="color:var(--red)">*</span></label>
          <select name="specialist" class="form-control" required>
            <option value="">اختر مقدم الخدمة</option>
            {% for s in specialists %}
              <option value="{{ s.pk }}">{{ s.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">المبلغ <span style="color:var(--red)">*</span></label>
            <input name="amount" type="number" step="0.01" min="0" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">التاريخ</label>
            <input name="date" type="date" class="form-control" value="{% now 'Y-m-d' %}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">الخزينة</label>
          <select name="treasury" class="form-control">
            <option value="">بدون خزينة</option>
            {% for t in treasuries %}
              <option value="{{ t.pk }}" {% if forloop.first %}selected{% endif %}>{{ t.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">ملاحظات <span class="form-optional">اختياري</span></label>
          <textarea name="notes" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn--ghost" data-close-modal="advance-modal">إلغاء</button>
        <button class="btn btn--primary" type="submit"><i class="fas fa-save"></i> حفظ</button>
      </div>
    </form>
  </div>
</div>
