{% load number_format %}
<div class="modal-overlay" id="payment-modal" style="display:none;">
  <div class="modal-dialog">
    <div class="modal-header">
      <span class="modal-title">{% if payment %}تعديل دفعة{% else %}تسجيل دفعة{% endif %}</span>
      <button class="btn btn--ghost btn--icon" data-close-modal="payment-modal"><i class="fas fa-times"></i></button>
    </div>
    <form id="payment-form" method="post" action="{% if payment %}{% url 'finance:client_payment_edit' payment.pk %}{% else %}{% url 'finance:client_payment_create' %}{% endif %}">
      {% csrf_token %}
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">الفاتورة</label>
          <select name="invoice" class="form-control">
            {% for inv in invoices %}
              <option value="{{ inv.pk }}" {% if payment and payment.invoice and payment.invoice.pk == inv.pk %}selected{% endif %}>{{ inv.number }} — {{ inv.client }} — {{ inv.total|format_number:2 }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">المبلغ</label>
          <input name="amount" class="form-control" type="number" step="any" min="0" required value="{% if payment %}{{ payment.amount }}{% endif %}">
        </div>
        <div class="form-group">
          <label class="form-label">طريقة الدفع</label>
          <select name="method" class="form-control">
            <option value="cash" {% if payment and payment.method == 'cash' %}selected{% endif %}>نقد</option>
            <option value="card_or_bank" {% if payment and payment.method == 'card_or_bank' %}selected{% endif %}>بطاقة أو بنك</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn--ghost" data-close-modal="payment-modal">إلغاء</button>
        <button class="btn btn--primary" type="submit"><i class="fas fa-save"></i> حفظ</button>
      </div>
    </form>
  </div>
</div>
