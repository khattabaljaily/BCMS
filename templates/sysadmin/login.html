{% load static %}<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول مدير النظام — EnjazBCMS</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;}
body{margin:0;font-family:Cairo,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;padding:16px;}
.login-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo .icon{width:60px;height:60px;background:#6366f1;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin-bottom:12px;}
.login-logo h1{font-size:20px;font-weight:800;color:#0f172a;}
.login-logo p{font-size:13px;color:#64748b;margin:0;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:700;color:#1e293b;margin-bottom:5px;}
.input-wrap{position:relative;}
.input-wrap i{position:absolute;top:50%;transform:translateY(-50%);right:12px;color:#94a3b8;font-size:14px;pointer-events:none;}
input{width:100%;padding:10px 34px 10px 12px;min-height:42px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:Cairo,sans-serif;font-size:14px;color:#1e293b;transition:border .18s,background .18s;background:#f8fafc;}
input:focus{outline:none;border-color:#6366f1;background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.btn-login{width:100%;padding:10px 14px;min-height:42px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-family:Cairo,sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .18s;margin-top:8px;}
.btn-login:hover{background:#4f46e5;}
.btn-login:active{transform:translateY(1px);}
.error-box{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;}
.back-link{text-align:center;margin-top:16px;font-size:12px;color:#64748b;}
.back-link a{color:#6366f1;font-weight:600;text-decoration:none;}
.back-link a:hover{text-decoration:underline;}

/* Mobile enhancements */
@media (max-width: 480px) {
  body{padding:12px;padding-top:28px;}
  .login-card{padding:28px 18px;border-radius:18px;}
  .login-logo .icon{width:56px;height:56px;font-size:24px;margin-bottom:10px;}
  .login-logo h1{font-size:18px;margin-bottom:4px;}
  .login-logo p{font-size:12px;}
  .form-group{margin-bottom:14px;}
  label{font-size:11px;margin-bottom:6px;}
  input{padding:13px 36px 13px 12px;font-size:16px;min-height:48px;border-radius:10px;}
  .input-wrap i{font-size:14px;right:10px;}
  .btn-login{padding:14px;font-size:15px;min-height:48px;margin-top:12px;border-radius:10px;}
  .error-box{padding:12px;font-size:13px;margin-bottom:14px;}
  .back-link{margin-top:14px;font-size:11px;}
}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="icon"><i class="fas fa-shield-halved"></i></div>
    <h1>EnjazBCMS Admin</h1>
    <p>لوحة إدارة النظام — المشرف العام</p>
  </div>

  {% if error %}
  <div class="error-box"><i class="fas fa-circle-xmark"></i> {{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>اسم المستخدم</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="admin" autofocus autocomplete="username">
      </div>
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>
    <button type="submit" class="btn-login">
      <i class="fas fa-right-to-bracket"></i> دخول
    </button>
  </form>

  <div class="back-link">
    <a href="{% url 'accounts:login' %}">← العودة لتسجيل دخول الحسابات</a>
  </div>
</div>
</body>
</html>
