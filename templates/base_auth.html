{% load static %}<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}EnjazBCMS{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="auth-scene {% block scene_class %}{% endblock %}">
  <!-- animated background blobs -->
  <div class="auth-blob auth-blob--1"></div>
  <div class="auth-blob auth-blob--2"></div>
  <div class="auth-blob auth-blob--3"></div>

  <!-- centered card wrapper -->
  <div class="auth-wrap {% block wrap_class %}{% endblock %}">
    <!-- card injected by child templates -->
    {% block body %}{% endblock %}

  </div>
</div>

<!-- Global spinner -->
<div id="global-spinner" aria-hidden="true" role="status">
  <div class="global-spinner__ring"></div>
</div>

<style>
  #global-spinner {
    position: fixed; inset: 0; z-index: 99999;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  #global-spinner.active { opacity: 1; pointer-events: auto; }
  .global-spinner__ring {
    width: 54px; height: 54px;
    border: 4px solid rgba(244,63,94,.15);
    border-top-color: #f43f5e;
    border-radius: 50%;
    animation: gs-spin .7s linear infinite;
  }
  @keyframes gs-spin { to { transform: rotate(360deg); } }
</style>

</body>
</html>
