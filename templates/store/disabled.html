{% load static %}<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ center.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/store.css' %}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #fdf2f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: #fff; border-radius: 20px; padding: 60px 40px; text-align: center; max-width: 400px; box-shadow: 0 8px 40px rgba(236,72,153,.12); }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 800; color: #1e293b; margin-bottom: 12px; }
    p { color: #64748b; font-size: 15px; line-height: 1.7; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🔒</div>
    <h1>{{ center.name }}</h1>
    <p>المتجر الإلكتروني غير متاح حالياً.<br>يرجى التواصل مع المركز مباشرةً.</p>
    {% if center.phone %}<p style="margin-top:16px;font-weight:700;color:#ec4899;">📞 {{ center.phone }}</p>{% endif %}
  </div>
</body>
</html>
