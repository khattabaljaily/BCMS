{% load static number_format %}<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>حجز موعد — {{ center.name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/store.css' %}">
</head>
<body class="store-page">
<div class="store-header" style="background:linear-gradient(135deg,#1a0a2e,#be185d);">
  <div class="store-header__name">{{ center.name }}</div>
  <div class="store-header__type">احجز موعدك</div>
</div>
<div class="store-section">
  <div class="booking-card">
    <h2 style="font-size:18px;font-weight:800;margin-bottom:20px;color:var(--slate-800);">تفاصيل الحجز</h2>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">اسمك</label>
        <input class="form-control" type="text" name="name" required placeholder="الاسم الكامل">
      </div>
      <div class="form-group">
        <label class="form-label">رقم الهاتف</label>
        <input class="form-control" type="tel" name="phone" required placeholder="09xxxxxxxx" style="text-align:right;direction:ltr;">
      </div>
      <div class="form-group">
        <label class="form-label">الخدمة المطلوبة</label>
        <select class="form-control" name="service">
          <option value="">— اختيارية —</option>
          {% for svc in services %}
            <option value="{{ svc.pk }}">{{ svc.name }} — {{ svc.price|format_number:2 }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">التاريخ المفضل</label>
          <input class="form-control" type="date" name="date" required style="text-align:right;direction:ltr;">
        </div>
        <div class="form-group">
          <label class="form-label">الوقت المفضل</label>
          <input class="form-control" type="time" name="time" style="text-align:right;direction:ltr;">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">ملاحظات</label>
        <textarea class="form-control" name="notes" rows="2" placeholder="أي طلبات خاصة..."></textarea>
      </div>
      <button type="submit" class="btn btn--primary btn--lg" style="width:100%;justify-content:center;">
        <i class="fas fa-calendar-check"></i> تأكيد الحجز
      </button>
    </form>
    <div style="text-align:center;margin-top:16px;">
      <a href="{% url 'store:home' slug=center.slug %}" style="color:var(--slate-500);font-size:13px;">← رجوع للمتجر</a>
    </div>
  </div>
</div>
</body>
</html>
