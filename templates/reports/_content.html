{% load static number_format %}

<div class="cx-scene">

  <!-- Hero -->
  <div class="cx-hero">
    <div class="cx-hero-inner">
      <div class="cx-hero-left">
        <div class="cx-hero-icon-wrap" style="background:linear-gradient(135deg,#3b82f6,#60a5fa);box-shadow:0 4px 14px rgba(59,130,246,.32);">
          <i class="fas fa-chart-bar"></i>
        </div>
        <div>
          <h1 class="cx-hero-title">التقارير</h1>
          <p class="cx-hero-desc">{{ date_from|date:'j/n/Y' }} — {{ date_to|date:'j/n/Y' }}</p>
        </div>
      </div>
      <div class="cx-hero-right">
        <div class="cx-hero-actions">
          <form method="get" class="report-filter-form">
            <select name="period" class="form-control form-control--sm" onchange="toggleCustom(this.value)">
              <option value="month"      {% if period == 'month'      %}selected{% endif %}>هذا الشهر</option>
              <option value="last_month" {% if period == 'last_month' %}selected{% endif %}>الشهر السابق</option>
              <option value="year"       {% if period == 'year'       %}selected{% endif %}>هذه السنة</option>
              <option value="custom"     {% if period == 'custom'     %}selected{% endif %}>مخصص</option>
            </select>
            <span id="custom-range" class="custom-range {% if period == 'custom' %}show{% endif %}">
              <input type="date" name="from" class="form-control form-control--sm" value="{{ date_from|date:'Y-m-d' }}">
              <input type="date" name="to"   class="form-control form-control--sm" value="{{ date_to|date:'Y-m-d' }}">
            </span>
            <button type="submit" class="btn btn--primary btn--sm"><i class="fas fa-filter"></i> عرض</button>
          </form>
          <button id="exportPdfBtn" class="btn btn--secondary" title="تصدير PDF" type="button">
            <i class="fas fa-file-pdf"></i> تصدير PDF
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- KPI Cards (full-bleed) -->
  <div class="kpi-cards full-bleed kpi-grid">
    {% include 'reports/_kpi_cards.html' %}
  </div>

  {% include 'reports/_rest_content.html' %}

</div>
